"$schema" = 'https://starship.rs/config-schema.json'

format = """
[╭─](silver) $username$hostname$directory$git_branch$git_status
[╰](silver) $character"""

add_newline = true

palette = "catppuccin_mocha"

[character]
success_symbol = ""
error_symbol = "[](red)"
vicmd_symbol = "[](mauve)"

[username]
show_always = true
style_user = "yellow"
style_root = "red bold"
format = "[ $user ](yellow)"

[hostname]
ssh_only = true
style = "purple"
format = "[at  $hostname ](purple)[in ](teal)"

[directory]
style = "red"
format = "[ $path ](red)"
truncate_to_repo = false
truncation_length = 5
truncation_symbol = "…/"

[git_branch]
symbol = ""
style = "yellow"
format = "[on ](teal)[$symbol $branch](yellow)"

[git_status]
style = "cyan"
format = "[$all_status$ahead_behind](cyan)"
modified = "*"
untracked = "?"
stashed = "\\$"
staged = "+"
renamed = "»"
deleted = "✘"
conflicted = "!"
ahead = " ⇡${count}"
behind = " ⇣${count}"
diverged = " ⇕⇡${ahead_count}⇣${behind_count}"

[cmd_duration]
min_time = 2_000
style = "overlay2"
format = "[took $duration ](overlay2)"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
silver = "#bac2de"
charcoal = "#585b70"
